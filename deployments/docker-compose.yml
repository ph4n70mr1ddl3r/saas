networks:
  frontend:
  backend:

x-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 15s

services:
  nats:
    image: nats:2-alpine
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      retries: 5
    networks:
      - backend

  # === Foundation ===
  iam:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/iam
        SERVICE_BINARY: saas-iam
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-iam
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8001"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8001"]
      <<: *default-healthcheck

  config-svc:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
