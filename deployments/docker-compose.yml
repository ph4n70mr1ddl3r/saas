      SERVICE_NAME: saas-hcm-benefits
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8012"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  time-labor:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/hcm/time-labor
        SERVICE_BINARY: saas-hcm-time-labor
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-hcm-time-labor
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8013"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  recruiting:
