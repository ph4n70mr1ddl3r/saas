version: "3.9"

networks:
  frontend:
  backend:

services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      retries: 5
    networks:
      - backend

  # === Foundation ===
  iam:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/iam
        SERVICE_BINARY: saas-iam
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-iam
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8001"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  config-svc:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/config-svc
        SERVICE_BINARY: saas-config
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-config
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8002"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # === HCM Module ===
  employee:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/hcm/employee
        SERVICE_BINARY: saas-hcm-employee
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-hcm-employee
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8010"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  payroll:
