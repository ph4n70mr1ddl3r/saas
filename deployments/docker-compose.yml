  manufacturing:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/scm/manufacturing
        SERVICE_BINARY: saas-scm-manufacturing
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-scm-manufacturing
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8033"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # === Gateway (front door) ===
  gateway:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/gateway
        SERVICE_BINARY: saas-gateway
    environment:
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8000"
      IAM_URL: http://iam:8001
      CONFIG_URL: http://config-svc:8002
      EMPLOYEE_URL: http://employee:8010
      PAYROLL_URL: http://payroll:8011
      BENEFITS_URL: http://benefits:8012
      TIME_LABOR_URL: http://time-labor:8013
      RECRUITING_URL: http://recruiting:8014
      GL_URL: http://general-ledger:8020
      AP_URL: http://accounts-payable:8021
      AR_URL: http://accounts-receivable:8022
      ASSETS_URL: http://fixed-assets:8023
      CASH_URL: http://cash-management:8024
      INVENTORY_URL: http://inventory:8030
      PROCUREMENT_URL: http://procurement:8031
      ORDERS_URL: http://order-management:8032
      MANUFACTURING_URL: http://manufacturing:8033
    ports:
      - "8000:8000"
    depends_on:
      - iam
      - config-svc
      - employee
      - payroll
      - benefits
      - time-labor
      - recruiting
      - general-ledger
      - accounts-payable
      - accounts-receivable
      - fixed-assets
      - cash-management
      - inventory
      - procurement
      - order-management
      - manufacturing
    networks:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  nats-data:
