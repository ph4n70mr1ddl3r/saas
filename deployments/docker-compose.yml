      context: ..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_PATH: services/hcm/payroll
        SERVICE_BINARY: saas-hcm-payroll
    environment:
      NATS_URL: nats://nats:4222
      SERVICE_NAME: saas-hcm-payroll
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: "8011"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  benefits:
